services:
  api:
    build: .
    ports:
      - "3002:3002"
    volumes:
      - pharmacy-data:/app/data
    environment:
      - PORT=3002
      - NODE_ENV=production
      - TCM_JWT_SECRET=${TCM_JWT_SECRET:-change-me-in-production}
      - ALLOW_DEMO_AUTH=${ALLOW_DEMO_AUTH:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - TCM_RULES_PATH=/app/server/config/tcm-rules.json
    restart: unless-stopped

volumes:
  pharmacy-data:
